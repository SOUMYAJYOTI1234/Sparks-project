<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Predictor</title>
    <meta name="description" content="Predict student exam scores based on study hours using machine learning">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            overflow: hidden;
        }

        /* Animated background orbs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 8s ease-in-out infinite alternate;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #7f5af0, transparent);
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #2cb67d, transparent);
            bottom: -80px;
            right: -80px;
            animation-delay: 2s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #7f5af0, #2cb67d);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(127, 90, 240, 0.3);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fffffe;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a1b2;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a1b2;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="number"] {
            width: 100%;
            padding: 16px 20px;
            padding-right: 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fffffe;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: #7f5af0;
            background: rgba(127, 90, 240, 0.06);
            box-shadow: 0 0 0 4px rgba(127, 90, 240, 0.15);
        }

        input[type="number"]::placeholder {
            color: #555;
        }

        /* Remove number input spinners */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }

        .input-suffix {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            color: #7f5af0;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #7f5af0, #6c47d6);
            border: none;
            border-radius: 14px;
            color: #fffffe;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #6c47d6, #5a3cc0);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(127, 90, 240, 0.35);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        /* Result card */
        .result {
            margin-top: 28px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(44, 182, 125, 0.12), rgba(127, 90, 240, 0.08));
            border: 1px solid rgba(44, 182, 125, 0.25);
            border-radius: 16px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #2cb67d;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fffffe;
            letter-spacing: -0.03em;
        }

        .result-value span {
            font-size: 1rem;
            font-weight: 400;
            color: #94a1b2;
            margin-left: 4px;
        }

        .result-detail {
            font-size: 0.85rem;
            color: #94a1b2;
            margin-top: 8px;
        }

        .result-detail strong {
            color: #7f5af0;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
        }

        .footer a {
            color: #7f5af0;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .card {
                padding: 36px 24px;
                border-radius: 20px;
            }
            h1 { font-size: 1.5rem; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">📚</div>
            <h1>Score Predictor</h1>
            <p class="subtitle">
                Predict a student's expected exam score based on their daily study hours using machine learning.
            </p>

            <form method="POST" action="/" id="predict-form">
                <div class="form-group">
                    <label for="hours">Study Hours Per Day</label>
                    <div class="input-wrapper">
                        <input
                            type="number"
                            id="hours"
                            name="hours"
                            step="0.25"
                            min="0"
                            max="24"
                            placeholder="e.g. 6.5"
                            value="{{ hours if hours is not none else '' }}"
                            required
                        >
                        <span class="input-suffix">hrs/day</span>
                    </div>
                </div>

                <button type="submit" id="predict-btn">
                    🔮 Predict Score
                </button>
            </form>

            {% if result is not none %}
            <div class="result">
                <div class="result-label">Predicted Score</div>
                <div class="result-value">
                    {{ result }}<span>/ 100</span>
                </div>
                <div class="result-detail">
                    Based on <strong>{{ hours }} hours</strong> of daily study
                </div>
            </div>
            {% endif %}
        </div>

        <div class="footer">
            Powered by scikit-learn · Built by
            <a href="https://github.com/SOUMYAJYOTI1234" target="_blank">Soumyajyoti Chatterjee</a>
        </div>
    </div>
</body>
</html>
